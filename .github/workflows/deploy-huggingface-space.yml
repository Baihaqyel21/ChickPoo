name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "models/**"
      - "deployment/huggingface-space/**"
      - "scripts/deploy_hf_space.py"
      - ".github/workflows/deploy-huggingface-space.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment secret
        id: deployment_secret
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -n "$HF_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "HF_TOKEN is not configured. Skipping Hugging Face deployment."
          fi

      - name: Checkout repository
        if: steps.deployment_secret.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        if: steps.deployment_secret.outputs.ready == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deployment dependency
        if: steps.deployment_secret.outputs.ready == 'true'
        run: python -m pip install --upgrade huggingface_hub

      - name: Upload Space files
        if: steps.deployment_secret.outputs.ready == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: baihaqyel/chickpoo-api
          CORS_ORIGINS: https://chickpoo.vercel.app
        run: python scripts/deploy_hf_space.py
